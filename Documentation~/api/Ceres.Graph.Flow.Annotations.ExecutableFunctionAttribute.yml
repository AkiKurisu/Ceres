    startLine: 22588
  assemblies:
  - cs.temp.dll
  namespace: Ceres.Graph.Flow.Annotations
  summary: "\nFunction can be executed in dependency execution path, only support static method\n"
  remarks: >-
    Functions executed in dependency mode should not depend on the execution order

    between nodes, and only execute based on the input values. For functions whose input

    parameters contain reference types, it is more appropriate to use forward path.
  example: []
  syntax:
    content: public bool ExecuteInDependency { get; set; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Public Property ExecuteInDependency As Boolean
